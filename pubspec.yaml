name: animatch
description: Matching platform for elite livestock genetics in Brazil.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.7.0

  # Immutable models & JSON
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Forms
  reactive_forms: ^17.0.0

  # Local storage
  hive_flutter: ^1.1.0

  # Images
  cached_network_image: ^3.4.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Card swiper (Discover screen)
  flutter_card_swiper: ^7.0.1

  # Deep links (WhatsApp, phone)
  url_launcher: ^6.3.1

  # Image picker (animal photos)
  image_picker: ^1.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Localization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
